<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Tab Freezer — импорт настроек</title>
<link rel="stylesheet" href="popup.css" />
<style>
  body {
    width: auto;
    height: auto;
    max-width: 480px;
    margin: 40px auto;
  }
  .importBox {
    border: 2px dashed var(--input-border);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    margin: 16px 0;
  }
</style>
</head>
<body>
  <h1>❄️ Tab Freezer — импорт настроек</h1>
  <p style="font-size: 13px;">
    Выберите файл настроек (<code>tab-freezer-settings-*.json</code>), сохранённый через экспорт.
  </p>

  <div class="importBox">
    <input type="file" id="fileInput" accept=".json,application/json" />
  </div>

  <p class="status" id="status"></p>
</body>
<script src="import.js"></script>
</html>
